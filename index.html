<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>토론</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 상태 메시지 -->
  <div id="message" class="fullscreen" style="display:none">
    <div class="center-box"><p id="message-text" class="msg-text"></p></div>
  </div>

  <!-- 시간 대기 -->
  <div id="waiting-screen" class="fullscreen" style="display:none">
    <div class="center-box">
      <div class="wait-icon">🕐</div>
      <div class="wait-label">토론 시작까지</div>
      <div id="countdown-display" class="countdown">--:--:--</div>
      <div class="wait-sub">오늘 밤 9시에 시작됩니다</div>
    </div>
  </div>

  <!-- 메인 피드 -->
  <div id="feed-screen" style="display:none">

    <!-- 헤더 -->
    <div class="feed-header">
      <div class="feed-header-left">
        <div class="feed-avatar" id="feed-my-avatar"></div>
        <div class="feed-my-name" id="feed-my-name"></div>
      </div>
      <div class="feed-header-center">
        <div class="feed-topic" id="feed-topic"></div>
      </div>
      <div class="feed-header-right">
        <div class="feed-timer" id="feed-timer">--:--</div>
      </div>
    </div>

    <!-- 주장 작성 -->
    <div class="claim-compose">
      <div class="compose-avatar" id="compose-avatar"></div>
      <div class="compose-right">
        <textarea id="compose-input" class="compose-input" placeholder="이 주제에 대한 나의 주장을 작성하세요..." rows="2"></textarea>
        <div class="compose-footer">
          <span id="compose-char" class="compose-char">0/200</span>
          <button id="compose-submit" class="compose-submit-btn" disabled>게시</button>
        </div>
      </div>
    </div>

    <!-- 피드 -->
    <div id="feed-list" class="feed-list">
      <div class="feed-empty">아직 주장이 없습니다.<br>첫 주장을 올려보세요!</div>
    </div>
  </div>

  <!-- 1:1 채팅 화면 -->
  <div id="chat-screen" style="display:none">
    <div class="chat-header">
      <button id="chat-back-btn" class="chat-back-btn">←</button>
      <div class="chat-header-info">
        <div class="chat-opp-avatar" id="chat-opp-avatar"></div>
        <div>
          <div class="chat-opp-name" id="chat-opp-name"></div>
          <div class="chat-opp-sub">1:1 대화 중</div>
        </div>
      </div>
      <div class="chat-header-right">
        <div class="chat-timer-wrap">
          <span class="chat-timer-label">종료까지</span>
          <span id="chat-timer" class="chat-timer-val">--:--</span>
        </div>
        <button id="end-chat-btn" class="end-chat-btn">■ 종료</button>
      </div>
    </div>

    <div class="chat-context-bar" id="chat-context-bar">
      <!-- 대화 신청한 주장 미리보기 -->
    </div>

    <div id="chat-messages" class="chat-messages"></div>

    <div id="chat-ended-bar" class="chat-ended-bar" style="display:none">
      대화가 종료되었습니다 &nbsp;
      <button id="goto-feed-btn" class="goto-feed-btn">피드로 돌아가기</button>
    </div>

    <div id="chat-input-area" class="chat-input-area">
      <textarea id="chat-input" class="chat-input" placeholder="메시지 입력..." rows="1"></textarea>
      <button id="chat-send-btn" class="chat-send-btn">↑</button>
    </div>
  </div>

  <!-- 종료 확인 모달 -->
  <div id="end-confirm-overlay" class="overlay-bg" style="display:none">
    <div class="modal-box">
      <div class="modal-icon">⚠️</div>
      <div class="modal-title">대화를 종료할까요?</div>
      <div class="modal-desc">종료하면 상대방도 더 이상 메시지를 보낼 수 없습니다.</div>
      <div class="modal-btns">
        <button id="end-cancel-btn" class="modal-btn-cancel">취소</button>
        <button id="end-confirm-btn" class="modal-btn-ok">종료</button>
      </div>
    </div>
  </div>

  <!-- 대화 신청 수신 모달 -->
  <div id="request-overlay" class="overlay-bg" style="display:none">
    <div class="modal-box">
      <div class="request-avatar-wrap">
        <div class="request-avatar" id="request-avatar"></div>
      </div>
      <div class="modal-title" id="request-title"></div>
      <div class="modal-desc" id="request-claim-preview"></div>
      <div class="modal-btns" style="justify-content:center">
        <button id="request-accept-btn" class="modal-btn-ok" style="flex:unset;padding:.75rem 2rem">수락하기</button>
      </div>
    </div>
  </div>

  <script src="https://debate-md2-2603.web.app/debate-core.js" data-architect-id="soori"></script>
  <script src="app.js"></script>
</body>
</html>
