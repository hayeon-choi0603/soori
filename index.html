<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>토론</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 상태 메시지 -->
  <div id="message" class="fullscreen" style="display:none">
    <div class="center-box">
      <p id="message-text" class="msg-text"></p>
    </div>
  </div>

  <!-- 대기 화면 -->
  <div id="waiting-screen" class="fullscreen" style="display:none">
    <div class="center-box">
      <div class="wait-icon">🕐</div>
      <div class="wait-label">토론 시작까지</div>
      <div id="countdown-display" class="countdown">--:--:--</div>
      <div class="wait-sub">오늘 밤 9시에 시작됩니다</div>
    </div>
  </div>

  <!-- STEP 1: 찬반 카드 스와이프 -->
  <div id="side-screen" class="fullscreen" style="display:none">
    <div class="side-top">
      <div class="app-logo">💬 토론</div>
      <div class="topic-pill">오늘의 주제</div>
      <h2 id="side-topic" class="side-topic"></h2>
    </div>

    <div class="card-stack-area">
      <div class="debate-card" id="debate-card">
        <div class="card-gradient"></div>
        <div class="card-content">
          <div class="card-topic-label">이 주제에 대해</div>
          <div class="card-topic-text" id="card-topic-text"></div>
          <div class="card-question">당신의 입장은?</div>
        </div>
        <!-- 스와이프 힌트 오버레이 -->
        <div class="swipe-hint-left" id="hint-left">반대 👎</div>
        <div class="swipe-hint-right" id="hint-right">찬성 👍</div>
      </div>
    </div>

    <div class="action-btns">
      <button class="action-btn con-btn" id="con-btn">
        <span class="action-icon">✕</span>
        <span class="action-label">반대</span>
      </button>
      <button class="action-btn pro-btn" id="pro-btn">
        <span class="action-icon">♥</span>
        <span class="action-label">찬성</span>
      </button>
    </div>
  </div>

  <!-- STEP 2: 강경도 선택 (매칭 대기) -->
  <div id="matching-screen" class="fullscreen" style="display:none">
    <div class="matching-header">
      <div class="matching-avatar" id="matching-avatar"></div>
      <div class="matching-name" id="matching-celeb-name"></div>
      <div class="matching-side-badge" id="matching-side-badge"></div>
    </div>

    <div class="intensity-card">
      <div class="intensity-card-title">강경도를 선택하면<br>매칭이 시작됩니다</div>
      <div class="intensity-slider-area">
        <div class="intensity-row">
          <button class="i-btn" data-intensity="1"><span class="i-num">1</span><span class="i-name">매우 온건</span></button>
          <button class="i-btn" data-intensity="2"><span class="i-num">2</span><span class="i-name">온건</span></button>
          <button class="i-btn" data-intensity="3"><span class="i-num">3</span><span class="i-name">중립</span></button>
          <button class="i-btn" data-intensity="4"><span class="i-num">4</span><span class="i-name">강경</span></button>
          <button class="i-btn" data-intensity="5"><span class="i-num">5</span><span class="i-name">매우 강경</span></button>
        </div>
      </div>
    </div>

    <div id="searching-status" class="searching-status" style="display:none">
      <div class="searching-dot-row">
        <span class="sdot"></span><span class="sdot"></span><span class="sdot"></span>
      </div>
      <div id="searching-text" class="searching-text"></div>
    </div>
  </div>

  <!-- STEP 3: 매칭 완료 애니메이션 -->
  <div id="match-found-screen" class="fullscreen" style="display:none">
    <div class="match-found-inner">
      <div class="match-found-hearts">💬</div>
      <div class="match-found-title">매칭 완료!</div>
      <div class="match-found-sub" id="match-found-sub"></div>
      <div class="match-avatars">
        <div class="match-av" id="av-me"></div>
        <div class="match-av-vs">VS</div>
        <div class="match-av" id="av-opp"></div>
      </div>
      <button class="btn-start-chat" id="start-chat-btn">대화 시작하기 →</button>
    </div>
  </div>

  <!-- STEP 4: 채팅 화면 -->
  <div id="chat-screen" style="display:none">
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="chat-opp-avatar" id="chat-opp-avatar"></div>
        <div class="chat-opp-info">
          <div class="chat-opp-name" id="chat-opp-name"></div>
          <div class="chat-opp-stance" id="chat-opp-stance"></div>
        </div>
      </div>
      <div class="chat-header-right">
        <div class="chat-timer">
          <span class="chat-timer-label">종료</span>
          <span id="chat-timer" class="chat-timer-val">--:--</span>
        </div>
      </div>
    </div>

    <div class="chat-topic-bar">
      <span class="chat-topic-label">주제</span>
      <span id="chat-topic-text" class="chat-topic-text"></span>
    </div>

    <div id="chat-messages" class="chat-messages"></div>

    <div id="chat-ended-bar" class="chat-ended-bar" style="display:none">
      토론이 종료되었습니다
    </div>

    <div id="chat-input-area" class="chat-input-area">
      <textarea id="chat-input" class="chat-input" placeholder="의견을 입력하세요..." rows="1"></textarea>
      <button id="chat-send-btn" class="chat-send-btn">↑</button>
    </div>
  </div>

  <!-- 관찰자 화면 -->
  <div id="viewer-screen" style="display:none">
    <div class="viewer-header">
      <div class="viewer-title-label">전체 토론 보기</div>
      <div id="viewer-title" class="viewer-title"></div>
    </div>
    <div id="viewer-matches" class="viewer-matches"></div>
  </div>

  <script src="https://debate-md2-2603.web.app/debate-core.js" data-architect-id="default"></script>
  <script src="app.js"></script>
</body>
</html>
