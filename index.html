<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토론</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 상태 메시지 (플랫폼 미접속, 토론 비활성 등) -->
  <div id="message-screen" class="fullscreen-center" style="display:none">
    <p id="message-text"></p>
  </div>

  <!-- 카운트다운 화면 (시간 외) -->
  <div id="countdown-screen" class="fullscreen-center" style="display:none">
    <div class="countdown-wrap">
      <h2 id="countdown-title"></h2>
      <p class="countdown-info">토론은 오후 5시~6시, 오후 8시~9시에 열립니다</p>
      <div id="countdown-timer" class="countdown-timer">00:00:00</div>
    </div>
  </div>

  <!-- 주장 입력 화면 -->
  <div id="claim-screen" style="display:none">
    <header>
      <div class="header-left">
        <span id="claim-celebrity" class="celebrity-name"></span>
        <span id="claim-side-badge" class="side-badge"></span>
      </div>
      <div id="claim-session-bar" class="session-end-bar" style="display:none">
        종료까지 <span id="claim-session-timer" class="session-timer-val">--:--</span>
      </div>
    </header>
    <div class="topic-bar">
      <h1 id="claim-title" class="debate-title"></h1>
    </div>
    <main class="claim-main">
      <div class="claim-box">
        <p class="claim-guide">이 토론에 대한 <strong>첫 주장</strong>을 입력하세요.<br>주장은 한 번만 쓸 수 있습니다.</p>
        <textarea id="claim-input" placeholder="주장을 입력하세요..." rows="6"></textarea>
        <button id="claim-submit-btn" class="btn-primary">주장 제출하기</button>
      </div>
    </main>
  </div>

  <!-- 메인 앱 (탭 UI) -->
  <div id="app" style="display:none">
    <header>
      <div class="header-left">
        <span id="app-celebrity" class="celebrity-name"></span>
        <span id="app-side-badge" class="side-badge"></span>
      </div>
      <div class="header-right">
        <div id="app-session-bar" class="session-end-bar" style="display:none">
          종료까지 <span id="app-session-timer" class="session-timer-val">--:--</span>
        </div>
        <div id="app-title" class="header-topic"></div>
      </div>
    </header>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="my-chat">내 채팅</button>
      <button class="tab-btn" data-tab="all-chats">다른 사람 채팅</button>
    </div>

    <!-- 탭 1: 내 채팅 -->
    <div id="tab-my-chat" class="tab-content">
      <div class="claims-area">
        <div id="my-claim-card" class="claim-card mine"></div>
        <div id="partner-claim-card" class="claim-card partner"></div>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div id="chat-input-area" class="chat-input-area">
        <textarea id="chat-input" placeholder="메시지를 입력하세요..." rows="2"></textarea>
        <button id="chat-send-btn" class="btn-send">전송</button>
      </div>
    </div>

    <!-- 탭 2: 다른 사람 채팅 리스트 -->
    <div id="tab-all-chats" class="tab-content" style="display:none">
      <div id="pairs-list" class="pairs-list"></div>
      <div id="pair-chat-view" class="pair-chat-view" style="display:none">
        <button id="back-btn" class="back-btn">← 목록으로</button>
        <div id="pair-chat-title" class="pair-chat-title"></div>
        <div id="pair-chat-messages" class="chat-messages"></div>
      </div>
    </div>
  </div>

  <script src="https://debate-md2-2603.web.app/debate-core.js" data-architect-id="soori"></script>
  <script src="app.js"></script>

</body>

</html>
