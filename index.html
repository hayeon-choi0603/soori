<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토론</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 상태 메시지 -->
  <div id="message" class="message" style="display:none">
    <div class="message-inner">
      <div class="message-icon">⬡</div>
      <p id="message-text"></p>
    </div>
  </div>

  <!-- 시간 대기 화면 -->
  <div id="waiting-screen" style="display:none">
    <div class="waiting-inner">
      <div class="waiting-label">토론 시작까지</div>
      <div id="countdown-display" class="countdown-display">--:--:--</div>
      <div class="waiting-sub">오늘 오후 9시가 되면 자동으로 입장됩니다</div>
    </div>
  </div>

  <!-- STEP 1: 찬반 선택 -->
  <div id="side-screen" style="display:none">
    <div class="side-inner">
      <div class="step-eyebrow">오늘의 토론 주제</div>
      <h2 id="side-title" class="topic-heading"></h2>
      <p class="step-sub">이 주제에 대한 입장을 선택하세요</p>
      <div class="side-btns">
        <button class="side-btn" data-side="pro">
          <span class="side-btn-icon">◎</span>
          <span class="side-btn-label">찬성</span>
          <span class="side-btn-desc">이 주제에 동의합니다</span>
        </button>
        <button class="side-btn" data-side="con">
          <span class="side-btn-icon">◎</span>
          <span class="side-btn-label">반대</span>
          <span class="side-btn-desc">이 주제에 동의하지 않습니다</span>
        </button>
      </div>
    </div>
  </div>

  <!-- STEP 2: 강경도 선택 (매칭 대기 화면) -->
  <div id="matching-screen" style="display:none">
    <div class="matching-inner">

      <div class="matching-top">
        <div class="matching-celeb-row">
          <span id="my-celeb-name" class="celeb-badge"></span>
          <span id="my-side-badge" class="side-badge"></span>
        </div>
        <div class="matching-title-row">상대를 찾고 있습니다</div>
      </div>

      <div class="intensity-section">
        <div class="intensity-label">강경도를 선택하면 매칭이 시작됩니다</div>
        <div class="intensity-btns">
          <button class="intensity-btn" data-intensity="1">
            <span class="intensity-num">1</span>
            <span class="intensity-name">매우<br>온건</span>
          </button>
          <button class="intensity-btn" data-intensity="2">
            <span class="intensity-num">2</span>
            <span class="intensity-name">온건</span>
          </button>
          <button class="intensity-btn" data-intensity="3">
            <span class="intensity-num">3</span>
            <span class="intensity-name">중립</span>
          </button>
          <button class="intensity-btn" data-intensity="4">
            <span class="intensity-num">4</span>
            <span class="intensity-name">강경</span>
          </button>
          <button class="intensity-btn" data-intensity="5">
            <span class="intensity-num">5</span>
            <span class="intensity-name">매우<br>강경</span>
          </button>
        </div>
      </div>

      <!-- 강경도 선택 후 상태 -->
      <div id="matching-searching" style="display:none">
        <div class="searching-row">
          <div class="searching-pulse"></div>
          <div class="searching-texts">
            <div id="searching-stance" class="searching-stance"></div>
            <div class="searching-desc">강경도 차이가 가장 큰 상대와 연결 중...</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 메인 토론 앱 -->
  <div id="app" style="display:none">
    <header>
      <div class="header-left">
        <div class="identity-block">
          <span id="nickname" class="nickname"></span>
          <span id="side-badge" class="side-badge"></span>
          <span id="intensity-badge" class="intensity-badge"></span>
        </div>
      </div>
      <div class="header-right">
        <div class="timer-block">
          <span class="timer-label">종료까지</span>
          <span id="timer-display" class="timer-display">--:--</span>
        </div>
        <button id="open-modal-btn" class="btn-primary" style="display:none">의견 작성</button>
      </div>
    </header>

    <div class="topic-bar">
      <div class="topic-eyebrow">오늘의 토론 주제</div>
      <h1 id="debate-title" class="debate-title"></h1>
      <div class="match-info">
        <span id="my-match-label" class="my-match-label"></span>
        <span class="match-vs">VS</span>
        <span id="opponent-name" class="opponent-name"></span>
        <span id="opponent-stance-badge" class="opponent-stance-badge"></span>
      </div>
    </div>

    <main>
      <div class="columns">
        <div class="column pro-col">
          <div class="col-header"><span class="col-dot pro-dot"></span>찬성</div>
          <div id="pro-list" class="opinions-list"></div>
        </div>
        <div class="divider"></div>
        <div class="column con-col">
          <div class="col-header"><span class="col-dot con-dot"></span>반대</div>
          <div id="con-list" class="opinions-list"></div>
        </div>
      </div>
    </main>

    <div id="ended-banner" class="ended-banner" style="display:none">
      토론이 종료되었습니다. 더 이상 의견을 제출할 수 없습니다.
    </div>
  </div>

  <!-- 관찰자 화면 -->
  <div id="viewer-screen" style="display:none">
    <div class="viewer-header">
      <div class="topic-eyebrow">전체 토론 열람</div>
      <h1 id="viewer-title" class="debate-title"></h1>
    </div>
    <div class="viewer-body">
      <div id="viewer-matches"></div>
    </div>
  </div>

  <!-- 의견 작성 모달 -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2>의견 제출</h2>
        <button id="close-modal-btn" class="modal-close">×</button>
      </div>
      <div class="modal-side-info">
        <span id="modal-side-badge" class="side-badge"></span>
        <span id="modal-intensity-badge" class="intensity-badge"></span>
        <span id="modal-nickname" class="modal-nick"></span>으로 제출됩니다
      </div>
      <textarea id="opinion-input" placeholder="이 주제에 대한 의견을 자유롭게 작성하세요..." rows="7"></textarea>
      <div class="modal-footer">
        <button id="submit-btn" class="btn-primary">제출하기</button>
      </div>
    </div>
  </div>

  <script src="https://debate-md2-2603.web.app/debate-core.js" data-architect-id="default"></script>
  <script src="app.js"></script>
</body>
</html>
