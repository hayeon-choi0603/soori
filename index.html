<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토론</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 상태 메시지 -->
  <div id="message" class="message" style="display:none">
    <div class="message-inner">
      <div class="message-icon">⬡</div>
      <p id="message-text"></p>
    </div>
  </div>

  <!-- 시간 대기 화면 -->
  <div id="waiting-screen" style="display:none">
    <div class="waiting-inner">
      <div class="waiting-label">토론 시작까지</div>
      <div id="countdown-display" class="countdown-display">--:--:--</div>
      <div class="waiting-sub">오늘 토론 시간이 되면 자동으로 입장됩니다</div>
    </div>
  </div>

  <!-- 매칭 화면 -->
  <div id="matching-screen" style="display:none">
    <div class="matching-inner">
      <div class="matching-pulse"></div>
      <div class="matching-label">상대를 찾는 중</div>
      <div id="my-celeb-name" class="celeb-badge"></div>
      <div class="matching-sub">같은 시간에 접속한 반대 측 참여자와 연결됩니다</div>
    </div>
  </div>

  <!-- 메인 토론 앱 -->
  <div id="app" style="display:none">
    <header>
      <div class="header-left">
        <div class="identity-block">
          <span id="nickname" class="nickname"></span>
          <span id="side-badge" class="side-badge"></span>
        </div>
      </div>
      <div class="header-right">
        <div id="timer-block" class="timer-block">
          <span class="timer-label">종료까지</span>
          <span id="timer-display" class="timer-display">--:--</span>
        </div>
        <button id="open-modal-btn" class="btn-primary" style="display:none">의견 작성</button>
      </div>
    </header>

    <div class="topic-bar">
      <div class="topic-eyebrow">오늘의 토론 주제</div>
      <h1 id="debate-title" class="debate-title"></h1>
      <div class="match-info">
        <span class="match-vs">VS</span>
        <span id="opponent-name" class="opponent-name"></span>
      </div>
    </div>

    <main>
      <div class="columns">
        <div class="column pro-col">
          <div class="col-header">
            <span class="col-dot pro-dot"></span> 찬성
          </div>
          <div id="pro-list" class="opinions-list"></div>
        </div>
        <div class="divider"></div>
        <div class="column con-col">
          <div class="col-header">
            <span class="col-dot con-dot"></span> 반대
          </div>
          <div id="con-list" class="opinions-list"></div>
        </div>
      </div>
    </main>

    <!-- 시간 종료 배너 -->
    <div id="ended-banner" class="ended-banner" style="display:none">
      토론이 종료되었습니다. 더 이상 의견을 제출할 수 없습니다.
    </div>
  </div>

  <!-- 의견 작성 모달 -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2>의견 제출</h2>
        <button id="close-modal-btn" class="modal-close">×</button>
      </div>
      <div class="modal-side-info">
        <span id="modal-side-badge" class="side-badge"></span>
        <span id="modal-nickname" class="modal-nick"></span> 으로 제출됩니다
      </div>
      <textarea id="opinion-input" placeholder="이 주제에 대한 의견을 자유롭게 작성하세요..." rows="7"></textarea>
      <div class="modal-footer">
        <button id="submit-btn" class="btn-primary">제출하기</button>
      </div>
    </div>
  </div>

  <script src="https://debate-md2-2603.web.app/debate-core.js" data-architect-id="soori"></script>
  <script src="app.js"></script>

</body>

</html>
